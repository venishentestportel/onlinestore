<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Storefront - OpenCarta</title>
  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            slate: { 950: '#0b0f19' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">

  <!-- Shared Header -->
  <header id="main-header" class="w-full"></header>

  <!-- STOREFRONT HERO SECTION -->
  <section class="w-full relative">
    <div class="h-48 md:h-64 w-full bg-slate-200 dark:bg-slate-800 overflow-hidden">
      <img id="store-banner" src="" class="w-full h-full object-cover" alt="Store Banner">
    </div>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative -mt-16 z-10">
      <div class="glass-panel p-6 md:p-8 rounded-3xl border border-gray-100 dark:border-slate-800/80 shadow-xl flex flex-col md:flex-row items-center md:items-start text-center md:text-left gap-6">
        <img id="store-logo" src="" class="w-24 h-24 rounded-2xl border bg-white dark:bg-slate-900 object-cover shadow" alt="Store Logo">
        <div class="flex-1 space-y-2">
          <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
            <div>
              <h1 id="store-name" class="text-2xl font-extrabold text-slate-800 dark:text-white font-heading">Apex Electronics</h1>
              <p id="store-desc" class="text-xs text-gray-400 max-w-xl">Premium gadgets and high performance gear.</p>
            </div>
            
            <!-- Follow action -->
            <button onclick="toggleFollowStore()" id="follow-btn" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-xs font-bold shadow-lg shadow-indigo-600/20 transition">
              Follow Store
            </button>
          </div>

          <div class="flex flex-wrap items-center justify-center md:justify-start gap-4 pt-2 text-xs font-semibold text-gray-500">
            <span class="flex items-center gap-1 text-amber-400">★ <span id="store-rating" class="text-slate-700 dark:text-slate-300 font-bold">5.0</span></span>
            <span>•</span>
            <span><span id="store-followers" class="text-slate-700 dark:text-slate-300 font-bold">0</span> Followers</span>
            <span>•</span>
            <span id="store-shipping-policy" class="text-indigo-600 dark:text-indigo-400">Standard Shipping Policy</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- STORE PRODUCTS GRID -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 flex-grow space-y-8">
    <div class="border-b pb-4 border-gray-100 dark:border-slate-800/60">
      <h2 class="text-lg font-bold text-slate-800 dark:text-white font-heading">Our Catalog</h2>
      <p class="text-xs text-gray-400">View and order items directly supplied by this merchant store.</p>
    </div>

    <div id="store-products-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
  </main>

  <!-- Shared Footer -->
  <footer id="main-footer" class="w-full"></footer>

  <!-- Scripts -->
  <script src="/js/supabase-client.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/chat.js"></script>

  <script>
    let isFollowing = false;
    let currentStore = null;

    function getStoreId() {
      return new URLSearchParams(window.location.search).get('id') || 'usr-seller1';
    }

    async function loadStorefront() {
      const storeId = getStoreId();
      const grid = document.getElementById('store-products-grid');

      try {
        // Load products by store
        const products = await apiClient.products.list({ store_id: storeId, approved_only: 'false' });
        
        // Find product first to get store metadata, or load list of stores
        if (products.length > 0) {
          // Get product detail containing store metadata
          const details = await apiClient.products.get(products[0].id);
          currentStore = details.store;
        } else {
          // Fallback mockup
          currentStore = {
            id: storeId,
            name: storeId === 'usr-seller2' ? 'Vogue Apparel' : 'Apex Electronics',
            logo_url: storeId === 'usr-seller2' 
              ? 'https://images.unsplash.com/photo-1509695507497-903c140c43b0?auto=format&fit=crop&w=200&h=200&q=80' 
              : 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=200&h=200&q=80',
            banner_url: storeId === 'usr-seller2' 
              ? 'https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&w=1200&h=400&q=80' 
              : 'https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1200&h=400&q=80',
            rating: storeId === 'usr-seller2' ? 4.65 : 4.85,
            followers_count: storeId === 'usr-seller2' ? 512 : 342,
            policies: { shipping: 'Ships within 24 hours.' }
          };
        }

        // Render Store Layout
        document.getElementById('store-banner').src = currentStore.banner_url;
        document.getElementById('store-logo').src = currentStore.logo_url;
        document.getElementById('store-name').innerText = currentStore.name;
        document.getElementById('store-desc').innerText = currentStore.description || 'Verified merchant storefront.';
        document.getElementById('store-rating').innerText = currentStore.rating;
        document.getElementById('store-followers').innerText = currentStore.followers_count;
        document.getElementById('store-shipping-policy').innerText = currentStore.policies.shipping || 'Standard Shipping';

        // Render Products
        if (products.length === 0) {
          grid.innerHTML = `<p class="text-xs text-gray-400 text-center col-span-full py-12">No products listed by this vendor yet.</p>`;
          return;
        }

        grid.innerHTML = products.map(p => `
          <div class="glass-card bg-white dark:bg-slate-900 border border-gray-100 dark:border-slate-800 rounded-3xl p-4 flex flex-col justify-between">
            <div class="relative overflow-hidden rounded-2xl group">
              <a href="/product.html?id=${p.id}" class="block">
                <img src="${p.images[0]}" class="w-full h-40 object-cover rounded-2xl group-hover:scale-105 transition duration-500" alt="">
              </a>
              <button onclick="saveWishlist('${p.id}')" class="absolute top-3 right-3 p-2 rounded-xl bg-white/80 dark:bg-slate-900/80 text-gray-400 hover:text-rose-500 transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
              </button>
            </div>
            <div class="pt-4 space-y-1">
              <a href="/product.html?id=${p.id}" class="block text-xs font-bold text-slate-800 dark:text-white truncate">${p.title}</a>
              <div class="flex items-center justify-between pt-2">
                <span class="text-sm font-extrabold text-indigo-600 dark:text-indigo-400">${formatPrice(p.price, p.currency)}</span>
                <button onclick="addProductToCart('${p.id}', '${p.title}', ${p.price}, '${p.images[0]}', '${p.store_id}', '${p.currency || 'USD'}')" class="p-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition">
                  <svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </button>
              </div>
            </div>
          </div>
        `).join('');

      } catch (err) {
        grid.innerHTML = `<p class="text-xs text-rose-500 text-center col-span-full">Failed to load vendor catalog.</p>`;
      }
    }

    function addProductToCart(id, title, price, img, storeId, currency) {
      cartHelper.addToCart({ product_id: id, product_title: title, price, image_url: img, store_id: storeId, currency: currency || 'USD' });
    }

    function saveWishlist(id) {
      let wish = JSON.parse(localStorage.getItem('wishlist')) || [];
      if (!wish.includes(id)) {
        wish.push(id);
        localStorage.setItem('wishlist', JSON.stringify(wish));
        showToast('Saved to Wishlist!', 'success');
      } else {
        showToast('Item already in Wishlist', 'info');
      }
    }

    function toggleFollowStore() {
      const btn = document.getElementById('follow-btn');
      const countEl = document.getElementById('store-followers');
      let count = parseInt(countEl.innerText);

      if (isFollowing) {
        isFollowing = false;
        btn.innerText = "Follow Store";
        btn.className = "px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-xs font-bold shadow transition";
        countEl.innerText = count - 1;
        showToast('Unfollowed Store', 'info');
      } else {
        isFollowing = true;
        btn.innerText = "Following";
        btn.className = "px-5 py-2.5 border border-indigo-600 text-indigo-600 bg-indigo-50/20 rounded-xl text-xs font-bold transition";
        countEl.innerText = count + 1;
        showToast('Following Store!', 'success');
      }
    }

    document.addEventListener('DOMContentLoaded', loadStorefront);
  </script>
</body>
</html>
